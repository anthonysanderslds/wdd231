<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Chamber of Commerce</title>
    <meta name="description"
        content="Landing page of businesses and organizations belonging to the Osceola Chamber of Commerce">
    <meta name="author" content="Anthony Sanders">

    <!-- Favicon -->
    <link rel="icon" href="images/chamber.ico">

    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Osceola Chamber of Commerce - Home">
    <meta property="og:type" content="website">
    <meta property="og:description" content="Find local businesses and organizations in Osceola, WI.">
    <meta property="og:image" content="https://anthonysanderslds.github.io/wdd231/images/student-profile.webp">
    <meta property="og:url" content="https://anthonysanderslds.github.io/wdd231/chamber/index.html">

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Google Fonts - Non-Render-Blocking -->
    <link rel="preload" as="style"
        href="https://fonts.googleapis.com/css2?family=Nunito&family=Roboto&family=Saira:wght@400;700&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Nunito&family=Roboto&family=Saira:wght@400;700&display=swap"
        rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Nunito&family=Roboto&family=Saira:wght@400;700&display=swap"
            rel="stylesheet">
    </noscript>

    <!-- Style Sheets -->

    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/larger.css" media="(min-width: 600px)">

    <!-- Scripts -->
    <script src="scripts/home.js" defer></script>
</head>

<body class="home">
    <header>
        <img src="images/chamber.webp" alt="Osceola Chamber of Commerce Logo" width="40" height="40">
        <span>Osceola Chamber of Commerce</span>
        <button id="ham-btn" class="hamburger" aria-label="Toggle navigation menu" aria-expanded="false"></button>
        <nav id="nav-bar" class="navigation" aria-label="Main navigation">
            <a href="index.html" class="active">Home</a>
            <a href="directory.html">Directory</a>
            <a href="join.html">Join</a>
            <a href="discover.html">Discover</a>
        </nav>
    </header>
    <main>
        <div id="hero-join-content">
            <img class="hero" src="images/chamber-image.jpg" alt="Main location of Osceola Chamber of Commerce" width="1200"
                height="400">
            <button class="join">Join Our Chamber</button>
        </div>
        <h1>Home</h1>
        <div id="weather-events-grid">
            <section class="events">
                <h2>Events</h2>
            </section>
            <section class="current-weather">
                <h2>Current Weather</h2>
                <div class="current-weather-layout">
                    <img id="weather-icon" src="" alt="">
                    <div class="cweather-details">
                        <p id="current-weather"></p>
                        <p id="weather-desc"></p>
                        <p id="temp-max"></p>
                        <p id="temp-min"></p>
                        <p id="humidity"></p>
                        <p id="sunrise"></p>
                        <p id="sunset"></p>
                    </div>
                </div>
            </section>
            <section class="forecast">
                <h2>Weather Forecast</h2>
                <div id="weather-forecast"></div>
            </section>
        </div>
        <section id="spotlights"></section>
    </main>
    <footer>
        <div>
            <p><strong>Osceola Chamber of Commerce</strong></p>
            <p>123 Osceola Way</p>
            <p>Osceola, WI 54020</p>
            <p>info@osceolacc.com</p>
            <p>(555) 555-5555</p>
        </div>
        <div class="social">
            <a href="https://github.com/anthonysanderslds" aria-label="GitHub">
                <img src="images/github-svgrepo-com.svg" alt="GitHub Icon" width="16" height="16">
            </a>
            <a href="https://www.linkedin.com/in/anthony-sanders-a8a59238" aria-label="LinkedIn">
                <img src="images/linkedin-svgrepo-com.svg" alt="LinkedIn Icon" width="16" height="16">
            </a>
            <a href="https://www.facebook.com/" aria-label="Facebook">
                <img src="images/facebook-svgrepo-com.svg" alt="Facebook Icon" width="16" height="16">
            </a>
        </div>
        <div>
            <p>WDD 231 Class Project</p>
            <p>Anthony Sanders</p>
            <p>&copy; <span id="currentYear"></span> Osceola Chamber of Commerce</p>
            <p id="lastModified"></p>
        </div>
    </footer>
</body>

</html>
